<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Eidolon Life Counter</title>
<meta name="theme-color" content="#0a0d13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eidolon LP">
<style>
  :root{--panel:#171c26; --panel2:#1e2534; --border:#2a3347; --text:#e7ecf5; --muted:#8b96ab; --accent:#f0b429;}
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overscroll-behavior:none;}
  body{background:#0a0d13; color:var(--text); font-family:'Segoe UI','Leelawadee UI','Noto Sans Thai',Tahoma,sans-serif; touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;}
  .btn{background:var(--panel2); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; font-size:14px; cursor:pointer; white-space:nowrap;}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#1a1a0a; font-weight:700;}
  .btn.danger{border-color:#7f1d1d;}
  .cpanel{position:absolute; left:0; right:0; height:50%; overflow:hidden;}
  #cp2{top:0; transform:rotate(180deg); background:linear-gradient(180deg,#101726,#0a0d13);}
  #cp1{bottom:0; background:linear-gradient(0deg,#161226,#0a0d13);}
  .cinner{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2vh; padding:12px;}
  .crow{display:flex; align-items:center; justify-content:center; gap:2.5vw; width:100%;}
  .crow .zl,.crow .zr{flex:1 1 0; display:flex; align-items:center; justify-content:center; gap:2vw; min-width:0;}
  .crow .zc{display:flex; align-items:center; justify-content:center; gap:3vw;}
  .chp{font-size:min(17vh,22vw); font-weight:900; line-height:1; min-width:2ch; text-align:center; font-variant-numeric:tabular-nums; margin:0 min(4.5vh,7vw);}
  .chp.low{color:#ef4444;}
  .cbig{width:min(11vh,16vw); height:min(11vh,16vw); border-radius:50%; border:2px solid var(--border); background:var(--panel); color:var(--text); font-size:min(5vh,7vw); font-weight:800; cursor:pointer; flex-shrink:0;}
  .cbig:active{background:var(--accent); color:#1a1a0a; border-color:var(--accent);}
  .csmall{padding:6px 14px; border-radius:16px; border:1px solid var(--border); background:var(--panel); color:var(--muted); font-size:min(1.9vh,3.4vw); cursor:pointer; white-space:nowrap;}
  .csmall:active{border-color:var(--accent); color:var(--accent);}
  .clabel{font-size:min(1.8vh,3.2vw); color:var(--muted); letter-spacing:1px; font-weight:700;}
  .caerow{margin-top:2.5vh;}
  .caether{display:flex; align-items:center; gap:4vw;}
  .cspark{width:min(9vh,14vw); height:min(9vh,14vw); border-radius:50%; border:2px solid var(--border); background:var(--panel); color:#3a4356; font-size:min(5vh,7.5vw); line-height:1; cursor:pointer; flex-shrink:0; transition:color .12s, border-color .12s, text-shadow .12s;}
  .cspark.lit{color:#7dd3fc; border-color:#7dd3fc; text-shadow:0 0 12px #38bdf8, 0 0 24px #0ea5e9;}
  .cspark:active{transform:scale(.92);}
  #cmid{position:absolute; top:50%; left:0; right:0; transform:translateY(-50%); display:flex; justify-content:center; gap:10px; z-index:5; pointer-events:none;}
  #cmid .btn{pointer-events:auto; box-shadow:0 2px 12px rgba(0,0,0,.5);}
  #cfirstMsg{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--accent); color:#1a1a0a; font-weight:900; font-size:min(3.5vh,6vw); padding:14px 30px; border-radius:30px; z-index:6; display:none; box-shadow:0 4px 24px rgba(0,0,0,.6);}
  .cname{position:absolute; top:max(8px, env(safe-area-inset-top)); left:12px; font-size:min(1.8vh,3.2vw); color:var(--muted); font-weight:700; letter-spacing:1px;}
</style>
</head>
<body>
  <div class="cpanel" id="cp2">
    <span class="cname">PLAYER 2</span>
    <div class="cinner">
      <div class="crow">
        <button class="csmall" onclick="resetHP(2)">↻ RESET LP</button>
        <button class="csmall" onclick="chgMax(2,-1)">Max −</button>
        <span class="clabel" id="cmax2">30</span>
        <button class="csmall" onclick="chgMax(2,1)">Max +</button>
      </div>
      <div class="crow">
        <button class="cbig" onclick="chgHP(2,-1)">−</button>
        <span class="chp" id="chp2">30</span>
        <button class="cbig" onclick="chgHP(2,1)">+</button>
      </div>
      <div class="crow caerow">
        <span class="zl"><span class="clabel">AETHER</span></span>
        <span class="zc"><div class="caether">
          <button class="cspark" id="cae2_0" onclick="toggleAE(2,0)">✦</button>
          <button class="cspark" id="cae2_1" onclick="toggleAE(2,1)">✦</button>
          <button class="cspark" id="cae2_2" onclick="toggleAE(2,2)">✦</button>
        </div></span>
        <span class="zr"><button class="csmall" onclick="resetAE(2)">↻</button></span>
      </div>
    </div>
  </div>
  <div class="cpanel" id="cp1">
    <span class="cname">PLAYER 1</span>
    <div class="cinner">
      <div class="crow">
        <button class="csmall" onclick="resetHP(1)">↻ RESET LP</button>
        <button class="csmall" onclick="chgMax(1,-1)">Max −</button>
        <span class="clabel" id="cmax1">30</span>
        <button class="csmall" onclick="chgMax(1,1)">Max +</button>
      </div>
      <div class="crow">
        <button class="cbig" onclick="chgHP(1,-1)">−</button>
        <span class="chp" id="chp1">30</span>
        <button class="cbig" onclick="chgHP(1,1)">+</button>
      </div>
      <div class="crow caerow">
        <span class="zl"><span class="clabel">AETHER</span></span>
        <span class="zc"><div class="caether">
          <button class="cspark" id="cae1_0" onclick="toggleAE(1,0)">✦</button>
          <button class="cspark" id="cae1_1" onclick="toggleAE(1,1)">✦</button>
          <button class="cspark" id="cae1_2" onclick="toggleAE(1,2)">✦</button>
        </div></span>
        <span class="zr"><button class="csmall" onclick="resetAE(1)">↻</button></span>
      </div>
    </div>
  </div>
  <div id="cmid">
    <button class="btn primary" id="cfirstBtn" onclick="pickFirst()">🎲 FIRST!</button>
    <button class="btn" onclick="toggleFS()">⛶ เต็มจอ</button>
    <button class="btn" onclick="resetGame()">↻ เริ่มใหม่</button>
  </div>
  <div id="cfirstMsg"></div>

<script>
const LS_CTR = 'eidolon_counter_v2';
let ctr = {hp1:30, hp2:30, max1:30, max2:30, ae1:[1,1,1], ae2:[1,1,1]};
try{ const c = JSON.parse(localStorage.getItem(LS_CTR));
  if(c && typeof c.hp1==='number'){ ctr = c;
    if(!Array.isArray(ctr.ae1)) ctr.ae1 = [1,1,1];
    if(!Array.isArray(ctr.ae2)) ctr.ae2 = [1,1,1]; } }catch(e){}
function saveCtr(){ try{ localStorage.setItem(LS_CTR, JSON.stringify(ctr)); }catch(e){} }
function drawCtr(){
  for(const p of [1,2]){
    const hpEl = document.getElementById('chp'+p);
    hpEl.textContent = ctr['hp'+p];
    hpEl.className = 'chp' + (ctr['hp'+p] <= 5 ? ' low' : '');
    document.getElementById('cmax'+p).textContent = ctr['max'+p];
    for(let i=0;i<3;i++){
      document.getElementById('cae'+p+'_'+i).className = 'cspark' + (ctr['ae'+p][i] ? ' lit' : '');
    }
  }
}
function chgHP(p,d){ ctr['hp'+p] = Math.max(0, Math.min(99, ctr['hp'+p]+d)); saveCtr(); drawCtr(); }
function chgMax(p,d){
  ctr['max'+p] = Math.max(1, Math.min(99, ctr['max'+p]+d));
  if(ctr['hp'+p] > ctr['max'+p]) ctr['hp'+p] = ctr['max'+p];
  saveCtr(); drawCtr();
}
function toggleAE(p,i){ ctr['ae'+p][i] = ctr['ae'+p][i] ? 0 : 1; saveCtr(); drawCtr(); }
function resetHP(p){ ctr['hp'+p] = ctr['max'+p]; saveCtr(); drawCtr(); }
function resetAE(p){ ctr['ae'+p] = [1,1,1]; saveCtr(); drawCtr(); }
function resetGame(){
  if(!confirm('เริ่มเกมใหม่? (HP กลับเป็นค่า Max และอีเธอร์เต็ม)')) return;
  ctr.hp1 = ctr.max1; ctr.hp2 = ctr.max2; ctr.ae1 = [1,1,1]; ctr.ae2 = [1,1,1];
  const fb = document.getElementById('cfirstBtn'); if(fb) fb.classList.add('primary');
  saveCtr(); drawCtr();
}
function toggleFS(){
  if(document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
  else { document.documentElement.requestFullscreen().catch(()=>{}); }
}
let firstTimer;
function pickFirst(){
  document.getElementById('cfirstBtn').classList.remove('primary');
  const msg = document.getElementById('cfirstMsg');
  let n = 0;
  clearInterval(firstTimer);
  msg.style.display = 'block';
  firstTimer = setInterval(() => {
    n++;
    msg.textContent = (n % 2 ? 'PLAYER 1' : 'PLAYER 2');
    msg.style.transform = 'translate(-50%,-50%)' + (n % 2 ? '' : ' rotate(180deg)');
    if(n > 14 + Math.floor(Math.random()*2)){
      clearInterval(firstTimer);
      msg.textContent = '🎲 ' + msg.textContent + ' เริ่มก่อน!';
      setTimeout(() => msg.style.display='none', 2600);
    }
  }, 120);
}
/* กันจอดับระหว่างเล่น (ถ้าเบราว์เซอร์รองรับ) */
if('wakeLock' in navigator){
  const lock = () => navigator.wakeLock.request('screen').catch(()=>{});
  lock();
  document.addEventListener('visibilitychange', () => { if(!document.hidden) lock(); });
}
drawCtr();
</script>
</body>
</html>
